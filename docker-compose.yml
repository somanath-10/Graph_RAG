services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.26
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=[]
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    env_file:
      - .env
    environment:
      - QDRANT_URL=${BACKEND_QDRANT_URL:-http://qdrant:6333}
      - NEO4J_URI=${BACKEND_NEO4J_URI:-bolt://neo4j:7687}
      - RAW_DIR=${RAW_DIR:-data/raw}
      - PROCESSED_DIR=${PROCESSED_DIR:-data/processed}
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - neo4j

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:${VITE_DEV_SERVER_PORT:-5173}"
    environment:
      - VITE_DEV_SERVER_HOST=${VITE_DEV_SERVER_HOST:-0.0.0.0}
      - VITE_DEV_SERVER_PORT=${VITE_DEV_SERVER_PORT:-5173}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-Patent GraphRAG}
      - VITE_APP_SUBTITLE=${VITE_APP_SUBTITLE:-React + FastAPI + OpenAI small models + Qdrant + Neo4j}
      - VITE_DEFAULT_QUESTION=${VITE_DEFAULT_QUESTION:-What is the invention disclosed in this patent?}
      - VITE_EXAMPLE_QUESTIONS=${VITE_EXAMPLE_QUESTIONS:-What is the invention in this patent?||Who are the inventors and assignee?||Summarize independent claim 1.||List the main embodiments or examples.||What measurements, ranges, or conditions are disclosed?}
      - VITE_QUERY_TOP_K=${VITE_QUERY_TOP_K:-12}
      - VITE_GRAPH_LIMIT=${VITE_GRAPH_LIMIT:-120}
      - VITE_SOURCE_PREVIEW_CHARS=${VITE_SOURCE_PREVIEW_CHARS:-260}
      - VITE_FACT_PREVIEW_CHARS=${VITE_FACT_PREVIEW_CHARS:-220}
      - VITE_MINIGRAPH_EDGE_LIMIT=${VITE_MINIGRAPH_EDGE_LIMIT:-12}
    depends_on:
      - backend

volumes:
  qdrant_data:
  neo4j_data:
